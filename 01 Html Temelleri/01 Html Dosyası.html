<!--

    1. Html5 kodlamak için dosyanın en üstüne  <!DOCTYPE html> ifadesi yazılır. !Doctype html5 olduğunu bildirir.

    2. Bir HTML belgesi <html> </html> etiketleri içinde yer alan kodlardan oluşur.

    3. Visual Studio gibi bir editörde kodlama yapıyorsanız başlangıçta ! işaretine basıp tab tab yaparsanız html yapısını kendisi oluşturur.

    4. Html etiketinin attributelarından lang değeri html sayfasında kullanılacak dil bilgisini içerir. tr yapılabilir.

    5. Head etiketi sayfanın htmlde sonra yer alması gereken ve genelde sayfa ile ilgili bilgileri içinde bulunduracak etiketleri barındıran kısımdır. Bu alanda meta etiketlerimizi ve özelliklerini belirleyecek. Sayfamıza bir başlık vereceğiz. 

    Gerektiği durumlarda style etiketi içine css kodlarımızı yazacak ya da css kodlarımızı bir dosyadan ya da bir linkten çekeceğimizi html sayfamıza bildireceğiz.

    6. meta etiketi sayfa ile ilgili pek çok meta bilgiye yer verir. meta etiketinin kullanılabilecek pek çok attribute'u vardır.

    7. charset özelliği ile kullanılacak karakter setinin ne olacağı bildirilir. Örneğin UTF-8 uluslar arası bir karakter setini işaret eder. Türkçe karakterler dahil her şey içinde vardır. Eğer sayfanızda ing içeriklerin dışında karakterler olabileceğini öngörüyorsanız bunu yapabilirsiniz.

    <meta charset="UTF-8">

    8. <meta http-equiv="X-UA-Compatible" content="IE=edge">

    Edge Frame ekler.

    9. <meta name="viewport" content="width=device-width, initial-scale=1.0">

    Görünüm genişliğini kullanılan cihaza ve ekran boyutuna göre ayarlar. 

    10. Eklenebilecek çok fazla meta özelliği vardır. Bunun için lütfen Html Temlleri klasöründe Meta Etiketi ve Özellikleri dosyasına göz atınız.

    11. title etiketi sayfa başlığını belirler. Sitenin tarayıcı sekmesinde görünen adını burada veririz.

    12. body etiketi site gövdesinde görünecek ne kadar içerik varsa her body içine yazılır.

    13. Javascript kodları body etiketi içinde tüm kodların en altına yazılması sayfa hızı açısında tavsiye edilendir. Java kodları istersek doğrudan body içinde yazılabileceği gibi dosya adresi ve ya linki de gösterilebilir.

    14. Bir html dosyası .htm ya da .html uzantısına sahip olmalıdır. Şimdi bu dosyası HtmlDosyası.html diye kaydedip. Dosyanın üzerine çift tıklayıp bir tarayıcıda açılmasını sağlayabilirsiniz. Ekranda hiçbir şey görmeyeceksiniz. Ama heyecanlanmayın daha yeni başlıyoruz.
