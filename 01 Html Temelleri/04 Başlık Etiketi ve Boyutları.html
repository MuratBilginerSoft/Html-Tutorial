<!--

    HTML de temel etiketler dediğimizde aklımıza ilk gelen etiket başlık etiketidir.

    Çünkü bir html dokümanında bulunan içeriği normal yazıdan ayırabilmek daha görseli güçlü halde sunabilmek için metnin başlıklarını bildirmek gerekir.

    HTML'de h etiketi başlık etikedir. 

    Ancak başlığımızın seviyeleri boyutları vardır.

    Nasıl ki biz bir doküman yazarken ana başlık alt başlık onunda altında başlık gibi şeyler yapıyorsak. Html bu gerçek dünya formunu yapmamıza olan sağlar.

    6 seviye başlık etiketi vardır.

    <h1> Merhaba HTML! </h1>
    <h2> Merhaba HTML! </h2>
    <h3> Merhaba HTML! </h3>
    <h4> Merhaba HTML! </h4>
    <h5> Merhaba HTML! </h5>
    <h6> Merhaba HTML! </h6>

    Bu şekilde body içine yazıp dosyamızı Başlık Etiketi ve Boyutları.html olarak kaydedip inceleyebilirsiniz.

    Burada h1 en büyük boyut h6 ise en küçük boyuttur.

-->
