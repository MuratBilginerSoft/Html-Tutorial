<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anasayfa</title>
</head>
<body>

    <p>Ben şimdi 5 birim boşluk         bıraktım.</p>

    <p>Ben şimdi 5 birim boşluk &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; bıraktım.</p>

    
</body>
</html>


<!--

    Daha önce demiştik ki bir html belsinde space tuşuyla ne kadar boşluk bırakırsanız bırakın tarayıcı bunu tek boşluğa indigeyecek ve öyle gösterecektir.

    Soru biz hiç mi istediğimiz kadar boşluk koyamayacağız.

    Tabii ki koyabileceğiz. Bunun içinde yine space tuşunun kaçış karakterini kullanıyor olacağız.

    Boşluğun kaçış karakteri &nbsp; dir.

    <p>Ben şimdi 5 birim boşluk         bıraktım.</p>

    <p>Ben şimdi 5 birim boşluk &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; bıraktım.</p>

    Ekran çıktısına bakarak sonucu görebilirsiniz.

    

-->
