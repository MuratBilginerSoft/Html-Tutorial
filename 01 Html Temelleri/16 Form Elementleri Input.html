    Bugüne kadar öğrendiğimiz HTML özellikleri hep bizden kullanıcıya bir deklarasyon ya da bilgi sağladığımız ekranlar yaratmamızı sağladı.

    Peki bir web sayfası sadece bilgi göstermek için mi kullanılır. Tabii ki hayır. Kullanıcıyla etkileşimde kurar iyi web sayfaları.

    İşte input ögelerini sağlayacak etiketlerimizde sıra.

    Bir sayfada input ögeleri kullanılacak ve buradaki bilgiler farklı ekranlardan tekrar erişilecekse bu ögeleri form etiketi içine yerleştirmek gerekir.

    Form etiketinin ise önemli attributeları vardır. Onlardan biri action attribute'u.  

    Action attribute'u bu form hangi sayfaya gönderilecek bunu belirler.

    <from action="index.html">

    </from>


    Bu şekilde hazırladığımız bir form içinde submit butonuyla bu formu gönderdiğimiz form içindeki elemanları ile beraber index.html sayfasına yönlenir.

    2. Bir diğer attribute'umuz ise method bu attribute get ve post olmak üzere iki değer alır. Eğer get değerini alırsa form üzerinden gönderilen bilgiler adres çubuğuna eklenecektir. 

    Post metoduyla gönderirsek adres çubuğunda gösterilmeden gizli gönderilecektir. Hangisini kullanmanız gerektiğini programcı olarak programın güvenliğini tehlikeye atmayacak şekilde siz belirlersiniz.


    3. Form ögesi içine nesnelerimiz yerleştirilir.

    Bunlar genelde kullanıcıdan giriş beklediğimiz alanlar olduğu için <input> etiketi ile gösterilen alanlardır. 
    input etiketi kapanış etiketine ihtiyaç duymaz.

     <from action="index.html" method="POST">

        <input>

    </from>

    4. input etiketi tek başına bir text field gibi davranacaktır. Ancak bu çok anlamlı bir ifade değildir. 

    input'u anlamlı hale getirecek attributelarımız var.

    Onlardan biri type. Type attribute'u 

    text
    email
    number
    radio
    password
    checkbox
    file
    submit

    bu özellikleri alır.

    text ile başlayalım.

    Text kullanıcıda bir değer metinsel ya da sayısal ifade girdisi almak için kullanılır.

    <from action="index.html" method="POST">

        <input type="text">

    </from>

    Form içindeki nesnelerin değerlerini daha sonra alacağımız için her bir etikete bir name vermeliyiz. Ve nameler benzeşmemeli.

    Bir textfielda ne girilmesi gerektiğini textfieldın üzerinde ya da yanında yazarak bunu bildirebiliriz.

    <from action="index.html" method="POST">

        Adınız: 
        <input type="text" name="adı">

    </from>
    

    Ancak bunu daha güzel bir şekilde yapmak için placeholder özelliğine bir değer yazarsak textfiel içinde silik bir şekilde o gözükecektir.

     <from action="index.html" method="POST">

        Adınız: 
        <input type="text" name="adı" placeholder="Adınız">

    </from>
