<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <ul>

        <li>Kullanıcı: <bdi>eski</bdi>10</li>
      
        <li>Kullanıcı: <bdi>إيان</bdi>20</li>
      
    </ul>

    
    <bdo dir="rtl">

        Bu içeriğin metin yönü sağdan soladır.
      
    </bdo>

    <bdo dir="ltr">

        Bu içeriğin metin yönü soldan sağadır.
      
    </bdo>


    
</body>
</html>

<!--

    BDİ'nin açılımı Bi-directional Isolation (Çift yönlü izolasyon)'dur.

    <bdi> etiketi farklı yönde başlayan bir metni diğer metinlerden ayırır. (Örn: Arapça, ibranice)

    Metin yönü farklı içerik oluştururken sayfa düzenin sağlanması için bu etiketi kullanmak fayda sağlar.


    BDO'nun açılımı Bi-Directional Override (Çift yönlü geçersiz kılma)'dır.

    <bdo> etiketi geçerli metin yönünü geçersiz kılmak için kullanılır.

    Tek attribute'u vardır dir'dir. ltr ve rtl değerlerini alır.


-->
