<!--

    1. Div etiketi html belgesi içinde kutu oluşturmak için kullandığımız etikettir. Bir html belgesini istediğimiz bölümlere kolayca bölmemizi sağlar. 

    Bir block line etikettir.

    2. <div> </div> Div Tanımlandı

    Böyle bir ilk tanımda ekranda bir değişiklik olmamış gibi gözükecektir

    3. Div'e bir genişlik değeri verilemez ise safdanın tamamını sağdan sola kapsar.

    4. Bir yükseklik değeri verilmez ise içine content yazıldıkça o content kadar genişleyecek ve yükseklik değeri alacaktır.

    <div>Murat Bilginer</div>

    5. Genişliği %100 aldığını div'in rengini değiştirerek anlayalım.

    <div style="background-color: yellow;"> Brainy Tech </div>

    6. Kendimiz genişlik ve yükseklik verdiğimizde neler olduğuna bakalım. 


    <div style="background-color: yellow; width: 300px; height: 250px;">Murat Bilginer</div>

    7. İçerik konumlandırmalarını css kodları ile yapabiliriz.

    8. HTML4 de biz sayfayı parçalamak için kendi divlerimizi yazardık. Ancak html5 ile beraber tanım divleri geldi. 

    <article> +
    <aside> +
    <details> +
    <figcaption> +
    <figure> +
    <footer> +
    <header> +
    <main> +
    <mark> +
    <nav> +
    <section> +
    <summary> +
    <time> +

    Anlamsal etiketleri kullanmamız arama motorları açısından da çok önemlidir. Arama motorları sitemizi indexlemeye geldiğinde bu etiketleri görünce neyle ilgili olduğunu anlayacak ve buda sitemize seo açısından olumlu katkı sağlayacaktır.
        

    header :Sitenin başlık ve açıklama içeriğini yer alır. Sadece başlığınız olacaksa altı seviyeli başlıklardan (h1-h6) birini kullanmanız yeterli.

    nav : Menüleri, Gezinti (navigation) alanını temsil eder. Gezinti bağlantıları ya da içerik listesi için kullanılabilir.

    section : Genel bölümleme öğesidir. İçinde başlığı ve altalanı olan bir makale olabilir.

    article : Bir makale ya da yazı alanını temsil eder. Bu bir blog yazısı, yorum alanı, haber v.b. olabilir.

    aside : Ana içerikten ayrı yazılan, yüzeysel bir bağlantısı olan içeriğe denir.

        <p>Akşam üzeri arkadaşlarla Espark AVM'de turladık.</p>

        <aside>

        <h4>Espark AVM</h4>

        <p>Espark AVM Eskişehir merkezinde bulunan alışveriş merkezidir.</p>

        </aside>

    footer : Altalanı temsil eder. Bu bir sayfanın, bir bölümün ya da bir yazının altalanı olabilir.


    <figcaption> etiketi <figure> etiketi için bir başlık tanımlar.

    <figcaption> etiketi <figure> etiketinin ilk veya son etiketi olarak tanımlanabilir.
    
        <figure>

        <img src="figcalis.png" alt="Figure Başlık" width="200" height="120">

        <figcaption>Resim 1 - Figure için başlık tanımlaması<figcaption>

        </figure>

    <details> etiketi kullanıcı tarafından görüntelenip gizlenebilen ek bilgiler tanımlar.

    <details> etiketi açılıp kapanabilen etkileşimli bir nesne tanımlar. <details> etiketi içerisine bir çok içerik konulabilir.

    <details> etiketi open özelliği tanımlıysa içerik sayfa ilk yüklendiğinde görünürdür.

        <details>

        <summary>Göster / Gizle</summary>

        <p>Başlığa tıklandığında bu içerik gizlenir veya gösterilir.</p>

        </details>

    <summary> etiketi <details> etiketinin başlığını tanımlar. Başlık bilgisi içeriğin gösterilip/gizlenmesi için tıklanabilirdir.


    <time> etiketi Gregoryan takvimine göre saat veya tarih tanımlar.

        <p>Her sabah <time>10:00</time> gibi kalkarım.

        <p>Özel bir gün <time datetime="2012-02-14">Sevgililer günü</time>'ne az bir zaman kaldı.</p>
